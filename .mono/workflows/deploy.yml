name: deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ─── 1. Geänderte Apps ermitteln ──────────────────────────────────────────
  affected:
    name: Determine Affected Apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      has_apps: ${{ steps.changes.outputs.has_apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Deploy Ref
        run: git fetch origin refs/deploy/latest:refs/deploy/latest 2>/dev/null || true

      - name: Find Changed Apps
        id: changes
        run: |
          json=$(./mono changed --json --apps)
          echo "Raw output: ${json}"

          # Matrix für GitHub Actions bauen
          # Jede geänderte App wird ein eigener Matrix-Job
          matrix=$(echo "${json}" | sed 's/.*"changed":\[/[/' | sed 's/\]}.*/]/')

          # Prüfen ob es geänderte Apps gibt
          if [[ "${matrix}" == "[]" ]]; then
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
            # Matrix-Format für GitHub Actions: {"include": [{...}, {...}]}
            echo "matrix={\"include\":${matrix}}" >> "$GITHUB_OUTPUT"
          fi

  # ─── 2. Deploy Target ausführen & Docker Image bauen ─────────────────────
  deploy:
    name: "Deploy: ${{ matrix.name }}"
    needs: affected
    if: needs.affected.outputs.has_apps == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.affected.outputs.matrix) }}
      fail-fast: false
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Run Deploy Target
        run: ./mono run ${{ matrix.name }}:deploy

      # ─── Docker Build & Push (nur bei strategy: docker) ────────────────
      - name: Set up Docker Buildx
        if: matrix.deploy.strategy == 'docker'
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        if: matrix.deploy.strategy == 'docker'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        if: matrix.deploy.strategy == 'docker'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build & Push Docker Image
        if: matrix.deploy.strategy == 'docker'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── CapRover Deploy ───────────────────────────────────────────
      - name: Resolve CapRover Secrets
        if: matrix.deploy.strategy == 'docker'
        id: caprover
        run: |
          APP_UPPER=$(echo "${{ matrix.name }}" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
          echo "app_name_key=CAPROVER_APP_NAME_${APP_UPPER}" >> "$GITHUB_OUTPUT"
          echo "app_token_key=CAPROVER_APP_TOKEN_${APP_UPPER}" >> "$GITHUB_OUTPUT"

      - name: Deploy to CapRover
        if: matrix.deploy.strategy == 'docker'
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: "${{ secrets.CAPROVER_SERVER }}"
          app: "${{ secrets[steps.caprover.outputs.app_name_key] }}"
          token: "${{ secrets[steps.caprover.outputs.app_token_key] }}"
          image: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}:latest

  # ─── 3. Deploy-Stand markieren ───────────────────────────────────────────
  mark:
    name: Mark Deployment
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Deploy Ref
        run: ./mono deploy-mark --push
